    summary: Can Perform Cryptography
    description: |
      The binary performs cryptographic operations via CommonCrypto, the Security framework key APIs, or CryptoKit. Used for legitimate encryption, hashing, and signing, and also by ransomware and obfuscation routines.
    patterns:
      - CCCrypt
      - CCCryptorCreate
      - CC_SHA256
      - CC_SHA1
      - CC_MD5
      - SecKeyCreateSignature
      - SecKeyCreateEncryptedData
      - SecKeyCreateDecryptedData
      - CryptoKit
  - id: PASTEBOARD_API
    title: Pasteboard (clipboard) functions used
    summary: Can Read & Write the Clipboard
    description: |
      The binary reads from or writes to the system pasteboard. Clipboard access is used by productivity tools and also by spyware harvesting copied secrets such as passwords and crypto wallet addresses.
    patterns:
      - NSPasteboard
      - UIPasteboard
      - PNpasteboard
  - id: SCREEN_CAPTURE_API
    title: Screen capture functions used
    summary: Can Capture the Screen
    description: |
      The binary can capture screen contents via Core Graphics or ScreenCaptureKit. Legitimate for screenshot and screen-sharing tools, and a common surveillance capability in spyware.
    patterns:
      - CGDisplayCreateImage
      - CGWindowListCreateImage
      - CGDisplayStream
      - SCStream
      - SCShareableContent
  - id: INPUT_MONITORING_API
    title: Input monitoring functions used
    summary: Can Monitor Keyboard & Mouse Input
    description: |
      The binary installs event taps or HID input monitors to observe keyboard and mouse events system-wide. This underpins accessibility tools and automation, and is the core mechanism of keyloggers.
    patterns:
      - CGEventTapCreate
      - CGEventTapEnable
      - IOHIDManagerCreate
      - IOHIDManagerRegisterInputValueCallback
  - id: PERSISTENCE_LOGIN_ITEM
    title: Login item / service persistence functions used
    summary: Can Persist via Login Items or Services
    description: |
      The binary registers itself to run automatically via login items or the ServiceManagement framework. Expected for background agents, and a common persistence technique for malware.
    patterns:
      - SMLoginItemSetEnabled
      - SMAppService
      - LSSharedFileListInsertItemURL
      - SMJobBless
  - id: LOCATION_ACCESS
    title: Location services used
    summary: Can Access Device Location
    description: |
      The app uses Core Location to read the device's geographic position. A common, privacy-sensitive capability that requires user consent and is frequently abused by stalkerware.
    patterns:
      - CLLocationManager
      - startUpdatingLocation
      - requestWhenInUseAuthorization
      - requestAlwaysAuthorization
      - CLGeocoder
  - id: CAMERA_ACCESS
    title: Camera capture used
    summary: Can Access the Camera
    description: |
      The app captures still images or video from the device camera via AVFoundation or the image picker. Privacy-sensitive; a surveillance capability when combined with background execution.
    patterns:
      - AVCaptureDevice
      - AVCapturePhotoOutput
      - UIImagePickerController
      - requestAccessForMediaType
  - id: MICROPHONE_ACCESS
    title: Microphone / audio recording used
    summary: Can Record Audio
    description: |
      The app records audio or requests microphone permission. Privacy-sensitive; core to audio surveillance.
    patterns:
      - AVAudioRecorder
      - requestRecordPermission
      - setActive
      - AVAudioSession
  - id: CONTACTS_ACCESS
    title: Contacts access used
    summary: Can Access Contacts
    description: |
      The app reads the user's address book via the Contacts framework. Sensitive personal data commonly exfiltrated by spyware.
    patterns:
      - CNContactStore
      - CNContactFetchRequest
      - ABAddressBookCreate
  - id: PHOTOS_ACCESS
    title: Photo library access used
    summary: Can Access Photos
    description: |
      The app reads or modifies the user's photo library through the Photos framework.
    patterns:
      - PHPhotoLibrary
      - PHAsset
      - PHImageManager
  - id: TELEPHONY_INFO
    title: Telephony information accessed
    summary: Can Read Carrier & Telephony Info
    description: |
      The app inspects carrier and cellular network information via CoreTelephony. Used for analytics and also for device/SIM fingerprinting.
    patterns:
      - CTTelephonyNetworkInfo
      - CTCarrier
      - serviceSubscriberCellularProviders
  - id: MOTION_SENSORS
    title: Motion and fitness sensors used
    summary: Can Read Motion Sensors
    description: |
      The app reads accelerometer, gyroscope or pedometer data via Core Motion. Used for fitness and games, and for inferring user activity.
    patterns:
      - CMMotionManager
      - CMPedometer
      - CMAltimeter
      - startAccelerometerUpdates
  - id: BIOMETRIC_AUTH
    title: Biometric / local authentication used
    summary: Can Use Face ID / Touch ID
    description: |
      The app authenticates the user locally with Touch ID/Face ID via LocalAuthentication.
    patterns:
      - LAContext
      - evaluatePolicy
      - LAPolicyDeviceOwnerAuthentication
  - id: HEALTH_DATA
    title: Health data access used
    summary: Can Access Health Data
    description: |
      The app reads or writes HealthKit data, among the most sensitive personal data categories.
    patterns:
      - HKHealthStore
      - HKQuery
      - requestAuthorizationToShareTypes
  - id: BLUETOOTH_ACCESS
    title: Bluetooth used
    summary: Can Use Bluetooth
    description: |
      The app communicates over Bluetooth LE via Core Bluetooth, acting as central and/or peripheral. Used for accessories and for proximity-based tracking.
    patterns:
      - CBCentralManager
      - CBPeripheralManager
      - scanForPeripheralsWithServices
  - id: DEVICE_FINGERPRINTING
    title: Device identifier access used
    summary: Can Read Device Identifiers
    description: |
      The app reads stable device identifiers (vendor ID, advertising ID, device name). Used for analytics/attribution and for cross-app tracking and fingerprinting.
    patterns:
      - identifierForVendor
      - advertisingIdentifier
      - ASIdentifierManager
      - deviceToken
  - id: WEBVIEW_JS_EXECUTION
    title: Web view JavaScript execution used
    summary: Can Execute JavaScript in Web Views
    description: |
      The app hosts web content and injects or evaluates JavaScript via WKWebView. A code-execution surface; injected scripts can exfiltrate page data or bridge to native code.
    patterns:
      - WKWebView
      - evaluateJavaScript
      - WKUserScript
      - addScriptMessageHandler
  - id: APPLE_MACOS_XPC_SERVICE_USAGE
    title: macOS XPC Service Usage
    summary: Binary uses XPC APIs to communicate between processes
    description: |
      This Mach-O binary references symbols, classes, or selectors related to macOS XPC inter-process communication.
      If it exposes a privileged helper service, it must validate the client's code signature to prevent
      privilege escalation via trust cache bypass (e.g. Find My XPC / CDHash bypass).
    patterns:
      - xpc_connection_create_mach_service
      - xpc_connection_create
      - xpc_main
      - NSXPCListener
      - NSXPCConnection
      - NSXPCInterface
      - xpc_connection_get_audit_token
      - xpc_dictionary_get_audit_token
  - id: APPLE_MACOS_XPC_CONNECTION_HARDENING
    title: macOS XPC Connection Hardening
    summary: Binary uses APIs to validate XPC client identity/signature
    description: |
      This binary references APIs like xpc_connection_set_peer_code_signing_requirement or SecCodeCheckValidity,
      which are used to validate the code signing requirements of peer/guest processes connecting via XPC.
      This is a critical mitigation against connection impersonation vulnerabilities.
    patterns:
      - xpc_connection_set_peer_code_signing_requirement
      - SecCodeCopyGuestWithAttributes
      - SecCodeCheckValidity
