  - id: DYNAMIC_CODE_LOADING
    title: Dynamic library loading functions used
    summary: Can Load Code at Runtime
    description: |
      The binary resolves and loads code at runtime via the dynamic linker (dlopen/dlsym) or Foundation bundle loading. This allows functionality to be added after the binary ships and is commonly used by plugin systems, but is also abused to load code that evades static analysis.
    patterns:
      - dlopen
      - dlsym
      - dlclose
      - _dyld_register_func_for_add_image
      - NSBundle
      - bundleWithPath
      - NSLinkModule
      - DynamicLinkLibrary
  - id: PROCESS_EXECUTION
    title: Process execution functions used
    summary: Can Execute Other Programs
    description: |
      The binary can spawn and execute other programs or shell commands through NSTask, the POSIX spawn/exec family, or popen/system. This is expected for developer tooling but is also a hallmark of droppers and command execution payloads.
    patterns:
      - NSTask
      - posix_spawn
      - execve
      - execvp
      - execlp
      - _popen
      - _system
      - vfork
      - _fork
  - id: ENVIRONMENT_ACCESS
    title: Environment variable access functions used
    summary: Can Read & Modify Environment
    description: |
      The binary reads or modifies process environment variables (getenv/setenv) or inspects ProcessInfo. Environment access is routine but is also used for sandbox detection, configuration overrides, and locating injected libraries.
    patterns:
      - getenv
      - setenv
      - unsetenv
      - _environ
      - NSProcessInfo
      - ProcessInfo
  - id: KEYCHAIN_API
    title: Keychain Services functions used
    summary: Can Access Credentials in Keychain
    description: |
      The binary reads or writes secrets in the macOS/iOS Keychain via Security framework APIs. Legitimate for credential storage, but also a target for credential theft.
    patterns:
      - SecItemAdd
      - SecItemCopyMatching
      - SecItemUpdate
      - SecItemDelete
      - SecKeychainAddGenericPassword
      - SecKeychainFindGenericPassword
      - SecKeychainItemCopyContent
