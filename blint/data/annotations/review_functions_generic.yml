---
group: FUNCTION_REVIEWS
exe_type: [PE32, PE64, genericbinary, ELF, MachO]
rules:
  - id: CRYPTO_BEHAVIOR
    title: Function with Cryptographic Behavior
    summary: Function exhibits behavior commonly found in cryptographic routines.
    description: This function contains a high number of bitwise/shift/rotate instructions and uses SIMD registers, which is a strong indicator of cryptographic operations.
    check_type: function_analysis
  - id: INDIRECT_EXECUTION
    title: Function with Indirect Execution
    summary: Function uses indirect calls or jumps (e.g., call rax), a common technique in malware.
    description: Indirect control flow can be used to hide malicious functionality or implement complex logic like virtual function calls.
    check_type: function_flag
    check_field: has_indirect_call
  - id: SYSTEM_CALL_USAGE
    title: Function with Direct System Call
    summary: Function contains direct system call instructions (e.g., syscall).
    description: Direct system calls can be used to bypass standard library wrappers (libc) and are often seen in malware and shellcode.
    check_type: function_flag
    check_field: has_system_call
  - id: ANTI_DISASSEMBLY_TRICKS
    title: Function with Potential Anti-Disassembly
    summary: Function has a very low instruction count but contains jumps, potentially indicating an obfuscated thunk.
    description: Very small functions that do nothing but jump can be used to thwart linear sweep disassemblers or hide the true control flow.
    check_type: function_analysis
  - id: HIGH_ENTROPY_INDIRECT_CALL
    title: Function with High Entropy Indirect Call Target
    summary: Function performs indirect calls using a register whose value appears to be calculated or obfuscated.
    description: Indirect calls where the target is derived from complex calculations (e.g., arithmetic, shifts, XORs on constants or other registers) are common in malware for anti-analysis and hiding control flow.
    check_type: function_analysis
  - id: POTENTIAL_STACK_STRING
    title: Function Manipulates Potential Stack Strings
    summary: Function performs many moves and stores, possibly constructing strings on the stack.
    description: Malware sometimes constructs API names or other strings directly on the stack before passing them to functions like GetProcAddress.
    check_type: function_analysis
  - id: SUSPICIOUS_MEMORY_ALLOC
    title: Function Allocates Memory and Jumps/Executes
    summary: Function allocates memory (e.g., VirtualAlloc) and then potentially jumps to or executes code within that memory.
    description: This pattern is common in shellcode loaders and packers where decrypted/decoded code is allocated dynamically and then executed.
    check_type: function_analysis
  - id: HIGH_REGISTER_USAGE
    title: Function with High Register Usage
    summary: Function reads or writes a very high number of unique registers.
    description: Functions performing cryptographic operations or heavy obfuscation often manipulate many registers simultaneously. Checks `unique_regs_read_count` or `unique_regs_written_count` in `instruction_metrics`.
    check_type: function_metric
    check_field: instruction_metrics.unique_regs_read_count
    operator: ">"
    threshold: 25
  - id: HIGH_XOR_USAGE
    title: Function with High XOR Instruction Count
    summary: Function contains a disproportionately high number of XOR instructions.
    description: XOR instructions are common in obfuscation techniques and cryptographic routines. Checks `xor_count` in `instruction_metrics`.
    check_type: function_metric
    check_field: instruction_metrics.xor_count
    operator: ">"
    threshold: 50
  - id: HIGH_SHIFT_USAGE
    title: Function with High Shift/Rotate Instruction Count
    summary: Function contains a disproportionately high number of shift or rotate instructions.
    description: Shift and rotate instructions are characteristic of many cryptographic and hashing algorithms. Checks `shift_count` in `instruction_metrics`.
    check_type: function_metric
    check_field: instruction_metrics.shift_count
    operator: ">"
    threshold: 25
  - id: POTENTIAL_ANTI_DEBUG
    title: Function Contains Potential Anti-Debugging Checks
    summary: Function contains patterns commonly used for anti-debugging.
    description: This could involve checking specific registers, calling specific APIs (if resolved later), or using instructions like rdtsc for timing.
    check_type: function_analysis
  - id: HIGH_SIMD_USAGE
    title: Function with High SIMD/Vector Instruction Usage
    summary: Function uses a significant number of SIMD (SSE, AVX, etc.) instructions.
    description: SIMD instructions are often used for performance in cryptographic routines or data processing. Checks `simd_fpu_count` in `instruction_metrics`.
    check_type: function_metric
    check_field: instruction_metrics.simd_fpu_count
    operator: ">"
    threshold: 30
  - id: COMPLEX_CONTROL_FLOW
    title: Function with Complex Control Flow
    summary: Function contains a high number of conditional jumps, indicating complex logic or obfuscation.
    description: A high `conditional_jump_count` in `instruction_metrics` can suggest complex control flow, often used for obfuscation.
    check_type: function_metric
    check_field: instruction_metrics.conditional_jump_count
    operator: ">"
    threshold: 50
  - id: POTENTIAL_IAT_MANIPULATION
    title: Function Writes to Potential Import Address Table
    summary: Function writes data to memory locations that might correspond to the Import Address Table (IAT).
    description: Malware sometimes modifies the IAT to hook API calls or bypass standard library functions.
    check_type: function_analysis
  - id: UNUSUAL_CALLING_CONVENTION
    title: Function Potentially Violates Standard Calling Convention
    summary: Function modifies registers typically preserved by the calling convention without apparent restoration.
    description: Functions that modify callee-saved registers (like rbp, rbx, r12-r15 on x64) without saving them on the stack might be implementing hooks, trampolines, or other non-standard logic.
    check_type: function_analysis
  - id: POTENTIAL_SHELLCODE_CHARS
    title: Function Exhibits Potential Shellcode Characteristics
    summary: Function combines several indicators common in shellcode (e.g., syscalls, indirect calls, high register usage).
    description: A meta-rule combining flags like `has_system_call`, `has_indirect_call`, high `instruction_metrics.conditional_jump_count`, and low `instruction_count` might indicate shellcode-like behavior.
    check_type: function_analysis
  - id: LOOP_WITH_SELF_MODIFY_HINT
    title: Function Loop with Potential Self-Modification Indicators
    summary: Function contains a loop and also writes to memory (potential self-modifying code).
    description: A combination of `has_loop` and instructions that write to general memory locations (not just stack or known local variables) could be a hint.
    check_type: function_analysis
  - id: HIGH_ARITHMETIC_USAGE
    title: Function with High Arithmetic Instruction Count
    summary: Function contains a disproportionately high number of arithmetic/logical instructions (e.g., add, sub, imul, and, or).
    description: High usage of arithmetic instructions can be a sign of cryptographic algorithms or complex mathematical computations often found in malware. Checks `arith_count` in `instruction_metrics`.
    check_type: function_metric
    check_field: instruction_metrics.arith_count
    operator: ">"
    threshold: 50
  - id: DYNAMIC_API_RESOLUTION_HINT
    title: Function Shows Hints of Dynamic API Resolution
    summary: Function manipulates strings (potential API names) and makes indirect calls.
    description: Combines potential stack string construction (`POTENTIAL_STACK_STRING` logic) or string manipulation with indirect calls (`has_indirect_call`), suggesting dynamic API resolution.
    check_type: function_analysis
  - id: HIGH_JUMP_USAGE
    title: Function with High Unconditional Jump Count
    summary: Function contains a disproportionately high number of unconditional jump instructions.
    description: High `jump_count` in `instruction_metrics` might indicate obfuscation techniques or the implementation of jump tables, common in packed or obfuscated code.
    check_type: function_metric
    check_field: instruction_metrics.jump_count
    operator: ">"
    threshold: 50
  - id: POTENTIAL_ROP_GADGET
    title: Function Resembles a Potential ROP Gadget
    summary: Function is very small, performs minimal operations, and ends with a return.
    description: Short functions (e.g., < 10 instructions) that read registers/stack, perform simple operations, and end with `ret` might be ROP gadgets used in exploits.
    check_type: function_analysis
  - id: ARM64_PAC_USAGE
    title: Function uses Pointer Authentication (PAC)
    summary: Function contains ARM64 Pointer Authentication instructions.
    description: The presence of instructions like `pacibsp` or `autibsp` indicates that this function's return address is cryptographically signed to prevent ROP attacks.
    check_type: function_flag
    check_field: has_pac
  - id: INTEL_CET_IBT_USAGE
    title: Function uses Intel CET (IBT)
    summary: Function contains Intel Indirect Branch Tracking instructions.
    description: The presence of `endbr64` or `endbr32` instructions indicates the function is instrumented for Control-flow Enforcement Technology (CET) to prevent valid targets from being bypassed.
    check_type: function_flag
    check_field: has_security_feature
  - id: APPLE_SILICON_SREG_ACCESS
    title: Function Accesses Proprietary Apple System Registers
    summary: Function interacts with Apple-specific hardware controls (SPRR, GXF, PAC Keys).
    description: The function reads or writes to undocumented or Apple-proprietary system registers (MSR/MRS instructions). This usually indicates kernel-level security enforcement, anti-debugging, or hardware configuration.
    check_type: function_analysis
    check_field: sreg_interactions
  - id: BYOVD_API_CHAIN_IN_FUNCTION
    title: Function Chains BYOVD Memory Mapping APIs
    summary: A single function directly calls the sequence of APIs required to map physical memory.
    description: |
      This function directly invokes HalTranslateBusAddress and ZwMapViewOfSection. This exact behavior 
      matches known BYOVD exploits like CVE-2026-29923. It indicates the function likely accepts a user-provided 
      physical address via an IOCTL and maps it into the calling process's memory.
    check_type: function_metric
    check_field: direct_calls
    operator: "contains_all"
    patterns:
      - HalTranslateBusAddress
      - ZwMapViewOfSection
  - id: NTQSI_CLASS253_ZERO_LENGTH_CALL
    title: Function invokes NtQuerySystemInformation class 253 with zero output length
    summary: A single function sets up the class-253 zero-length query pattern described in CVE-2026-40369 research.
    description: |
      This function directly calls NtQuerySystemInformation and its assembly text also contains an immediate class 253 / 0xFD selector together with a zeroed output-length argument register or stack slot. That combination is a focused triage heuristic for the class-253 arbitrary-kernel-increment trigger described in public CVE-2026-40369 proof-of-concept material. It is not proof of exploitability or malicious intent.
    check_type: function_analysis
  - id: NTQSIEX_SYSTEM_BUILD_VERSION_QUERY
    title: Function invokes NtQuerySystemInformationEx for SystemBuildVersionInformation
    summary: A single function queries the uncommon SystemBuildVersionInformation selector via NtQuerySystemInformationEx.
    description: |
      This function directly calls NtQuerySystemInformationEx and its assembly text contains the SystemBuildVersionInformation selector (222 / 0xDE). In published CVE-2026-40369 exploit chains this query is used as part of kernel-read and structure-confusion staging. Legitimate diagnostics code can also query this class, so treat this as a focused review signal rather than a definitive exploit claim.
    check_type: function_analysis
  - id: NTQSI_CLASS253_DYNAMIC_INDIRECT_CALL
    title: Function dynamically resolves or indirectly calls class-253 NtQuerySystemInformation
    summary: A single function combines indirect-call evidence with class-253 zero-length setup consistent with GetProcAddress-style trigger wrappers.
    description: |
      This function either exposes an indirect-call hint that resolves to NtQuerySystemInformation or contains a GetProcAddress-style dynamic resolver chain, and the instruction window around the indirect call also sets up class 253 / 0xFD with a zero output length. This is designed to catch more heavily obfuscated CVE-2026-40369-style trigger wrappers that avoid a normal import or direct call edge.
    check_type: function_analysis
  - id: NTQSIEX_SYSTEM_BUILD_VERSION_DYNAMIC_INDIRECT_QUERY
    title: Function dynamically resolves or indirectly calls NtQuerySystemInformationEx build-version staging
    summary: A single function combines indirect-call evidence with SystemBuildVersionInformation selector setup.
    description: |
      This function either exposes an indirect-call hint that resolves to NtQuerySystemInformationEx or contains a GetProcAddress-style resolver chain, and the instruction window around the indirect call contains the uncommon SystemBuildVersionInformation selector (222 / 0xDE). This helps surface more obfuscated CVE-2026-40369 staging helpers that resolve the syscall wrapper dynamically.
    check_type: function_analysis
  - id: NTQSI_CLASS253_CROSS_FUNCTION_RESOLVER_CHAIN
    title: Function pairs a resolver helper with class-253 indirect invocation
    summary: A function calls an internal dynamic-resolution helper and then performs the class-253 zero-length indirect invocation pattern.
    description: |
      This function directly calls another internal helper that looks like a GetProcAddress-style resolver and then performs an indirect call in an instruction window containing class 253 / 0xFD and zero-length output setup. This rule is intended to catch CVE-2026-40369-style implementations that split API resolution and invocation across separate functions to avoid simpler same-function heuristics.
    check_type: function_analysis
  - id: NTQSIEX_SYSTEM_BUILD_VERSION_CROSS_FUNCTION_RESOLVER_CHAIN
    title: Function pairs a resolver helper with NtQuerySystemInformationEx build-version staging
    summary: A function calls an internal dynamic-resolution helper and then performs the SystemBuildVersionInformation indirect query pattern.
    description: |
      This function directly calls another internal helper that looks like a GetProcAddress-style resolver and then performs an indirect call in an instruction window containing the SystemBuildVersionInformation selector (222 / 0xDE). This helps catch CVE-2026-40369 staging logic that resolves NtQuerySystemInformationEx in one helper and consumes the returned function pointer in another.
    check_type: function_analysis
  - id: RPC_SERVER_IMPERSONATION_CHAIN
    title: Function combines RPC server setup and client impersonation
    summary: A single function stands up an RPC endpoint and impersonates the connecting client.
    description: |
      This function directly calls RpcServerRegisterIf, RpcServerUseProtseqEp, RpcServerListen, and RpcImpersonateClient. That combination is uncommon in ordinary client code and is useful for triaging Windows binaries that expose privileged RPC surfaces or appear to exercise RPC impersonation logic. This is a behavioral heuristic only; it does not prove a specific exploit or validate the blog's "PhantomRPC" claim.
    check_type: function_metric
    check_field: direct_calls
    operator: "contains_all"
    patterns:
      - RpcServerRegisterIf
      - RpcServerUseProtseqEp
      - RpcServerListen
      - RpcImpersonateClient
  - id: RPC_TOKEN_IMPERSONATION_CHAIN
    title: Function combines RPC impersonation and token duplication
    summary: A single function impersonates an RPC client and then opens or duplicates a token.
    description: |
      This function directly calls RpcImpersonateClient together with OpenThreadToken and DuplicateTokenEx. That sequence is a high-signal triage pattern for code that converts an RPC impersonation context into a reusable token. Legitimate administrative or service code can do this, so the review is intentionally behavioral and non-assertive.
    check_type: function_metric
    check_field: direct_calls
    operator: "contains_all"
    patterns:
      - RpcImpersonateClient
      - OpenThreadToken
      - DuplicateTokenEx
  - id: RPC_IMPERSONATION_PROCESS_CHAIN
    title: Function combines RPC impersonation and token-backed process creation
    summary: A single function impersonates an RPC client, duplicates a token, and launches a process with it.
    description: |
      This function directly calls RpcImpersonateClient, DuplicateTokenEx, and a token-backed process creation API such as CreateProcessWithTokenW or CreateProcessAsUser*. That combination is useful for triaging Windows service code that could transform an impersonation context into a new process running under the impersonated security context. This is not proof of exploitation, but it is a strong review signal.
    check_type: function_metric
    check_field: direct_calls
    operator: "contains_all"
    patterns:
      - RpcImpersonateClient
      - DuplicateTokenEx
      - CreateProcessWithToken
  - id: RPC_IMPERSONATION_ASUSER_PROCESS_CHAIN
    title: Function combines RPC impersonation and CreateProcessAsUser-style launch
    summary: A single function impersonates an RPC client, duplicates a token, and launches a process via CreateProcessAsUser*.
    description: |
      This function directly calls RpcImpersonateClient, DuplicateTokenEx, and CreateProcessAsUser*. That combination is useful for triaging Windows binaries that may translate an RPC impersonation context into a new process under the impersonated identity. Legitimate service helpers can use this pattern as well, so this review is intentionally descriptive rather than conclusive.
    check_type: function_metric
    check_field: direct_calls
    operator: "contains_all"
    patterns:
      - RpcImpersonateClient
      - DuplicateTokenEx
      - CreateProcessAsUser
  - id: CLOUDFILTER_ABORT_TOKEN_IMPERSONATION_CHAIN
    title: Function combines Cloud Filter abort operations and token impersonation
    summary: A single function invokes CfAbortOperation together with anonymous-token or thread-token impersonation primitives.
    description: |
      This function-level review catches MiniPlasma-style abort-hydration trigger loops that pair Cloud Filter abort operations with rapid impersonation-token changes. Legitimate Cloud Files providers may call CfAbortOperation, but combining it with anonymous-token or thread impersonation APIs is a focused local-elevation triage signal.
    check_type: function_analysis
  - id: CLOUDFILTER_ABORT_LOOP
    title: Function repeatedly invokes Cloud Filter abort operations
    summary: A function calls CfAbortOperation and contains loop/jump evidence consistent with a race trigger.
    description: |
      This function calls CfAbortOperation from code that also appears to loop. The public MiniPlasma proof of concept repeatedly calls CfAbortOperation as part of a race condition trigger. This heuristic is intentionally behavioral and should be correlated with registry policy-link or impersonation evidence.
    check_type: function_analysis
  - id: CLOUDFILTER_REGISTRY_POLICY_LINK_CHAIN
    title: Function manipulates CloudFiles policy registry links and security
    summary: A function combines registry write/delete activity, security-descriptor changes, and symbolic-link style registry behavior.
    description: |
      This function-level review catches CloudFiles policy-key manipulation patterns associated with MiniPlasma-style chains, including registry symbolic-link creation and security descriptor changes around policy paths such as CloudFiles/BlockedApps. It is intended for triage and does not prove exploitability by itself.
    check_type: function_analysis
  - id: WER_ENVIRONMENT_PROCESS_CHAIN
    title: Function combines WER session recovery and token-backed process launch
    summary: A function recovers a named-pipe server session and launches a process through CreateProcessAsUser-style APIs.
    description: |
      This review detects the post-elevation helper shape used by MiniPlasma-style WER QueueReporting environment-hijack chains: recover the originating session through GetNamedPipeServerSessionId and launch a process using CreateProcessAsUser*. The API combination is rare but can appear in legitimate service brokers, so treat the result as a review signal.
    check_type: function_analysis
