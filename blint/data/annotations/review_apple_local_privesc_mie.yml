text: Review disassembled Apple kernelcache functions for MIE _zalloc_ro_mut pre-patch bounds checks
group: FUNCTION_REVIEWS
exe_type: MachO
binary_type: MachO
rules:
  - id: APPLE_MIE_ZALLOC_RO_MUT_PREPATCH_BOUNDS
    title: Apple _zalloc_ro_mut pre-patch bounds-check shape
    summary: The _zalloc_ro_mut disassembly has the target-plus-length overflow-check shape without the patched per-CPU bound checks.
    description: |
      This rule reviews disassembled Mach-O functions named _zalloc_ro_mut and flags the pre-patch Apple MIE bypass-relevant bounds-check shape: target+len arithmetic in x8/x4 into x9 followed by an overflow branch, without the post-patch TPIDR_EL1 per-CPU bound checks and paired ccmp validations. It is intended for kernelcache triage and does not apply to ordinary userland copycat binaries.
    check_type: function_analysis