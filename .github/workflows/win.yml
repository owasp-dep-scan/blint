name: Build Windows Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-Build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        path: blint
        persist-credentials: false
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7  # v1.16.0
      with:
        cache: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.14'
    - name: Install poetry
      id: poetry
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools pyinstaller tzdata poetry
        cd blint
        poetry config virtualenvs.create false
        poetry install --without=extended --no-cache
    - name: Binary windows build
      run: |
        cd blint
        pyinstaller blint/cli.py --noconfirm --log-level=WARN --nowindow --onefile --name blint --add-data="blint/data;blint/data" --add-data="blint/data/annotations;blint/data/annotations" --collect-submodules blint --collect-submodules multi-demangle --collect-submodules oras --disable-windowed-traceback -i blint.ico --version-file=file_version_info.txt --noupx
        (Get-FileHash .\dist\blint.exe).hash | Out-File -FilePath .\dist\blint.exe.sha256
        set PYTHONIOENCODING=UTF-8
        .\dist\blint.exe -i .\dist\blint.exe -o reports --no-banner
      env:
        PYTHONIOENCODING: utf-8
        LANG: en_US.utf-8
        PYTHONUTF8: 1
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: blint/dist
        name: blint-windows
    - name: Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/blint.exe
          blint/dist/blint.exe.sha256