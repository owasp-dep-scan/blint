name: Upload Package

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
permissions: {}
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}

      - name: Build and push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=blint
          cache-to: type=gha,mode=max,scope=blint

  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Linux packages
        run: |
          sudo apt-get update
          sudo apt-get install zlib1g-dev libzstd-dev llvm-18 llvm-18-dev

      - name: Install dependencies
        run: |
          pipx install poetry
          pipx ensurepath

      - name: Verify Project TOML Version
        id: prep
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          poetry install --no-cache --all-groups --all-extras
          toml_version=$(echo "v"$(poetry version -s))
          if [[ $toml_version != $(echo $GITHUB_REF | cut -d / -f 3) ]]; then
            echo "TOML version does not match tag."
            exit 1
          fi
        env:
          NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
      - name: Build dist
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          poetry build --no-cache
        env:
          NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
      - name: Release PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

      - name: Generate SBOM with cdxgen
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t python -o bom.json $(pwd) -p
      - name: Upload bom to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
