name: Build Linux Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-GNU-Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            binary_name: blint-linux-amd64
          - os: ubuntu-24.04-arm
            binary_name: blint-linux-arm64
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        path: blint
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.13'
    - name: Linux packages
      run: |
        sudo apt-get update
        sudo apt-get install zlib1g-dev libzstd-dev llvm-18 llvm-18-dev
    - name: Install poetry
      id: poetry
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install setuptools pyinstaller poetry
        cd blint
        poetry config virtualenvs.create false
        poetry install --all-groups --all-extras --no-cache
      env:
        NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
    - name: Binary gnu build
      run: |
        cd blint
        pyinstaller blint/cli.py --noconfirm --log-level=WARN \
          --nowindow \
          --onefile \
          --name ${{ matrix.binary_name }} \
          --add-data="blint/data:blint/data" \
          --add-data="blint/data/annotations:blint/data/annotations" \
          --collect-submodules blint \
          --collect-submodules multi-demangle \
          --collect-submodules oras \
          --noupx
        ./dist/${{ matrix.binary_name }} -i dist/${{ matrix.binary_name }} -o /tmp/reports
        sha256sum ./dist/${{ matrix.binary_name }} > ./dist/${{ matrix.binary_name }}.sha256
      env:
        PYTHONIOENCODING: utf-8
        LANG: en_US.utf-8
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: ./blint/dist
        name: ${{ matrix.binary_name }}
    - name: Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/${{ matrix.binary_name }}
          blint/dist/${{ matrix.binary_name }}.sha256    
